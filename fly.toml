primary_region = "ord"

[build]
  image = "cardellier/openclaw:latest"

[mounts]
  source = "data"
  destination = "/data"
  initial_size = "16gb"

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

# OpenClaw Gateway Dashboard
[[services]]
  internal_port = 18789
  protocol = "tcp"
  [[services.ports]]
    port = 18789

[vm]
  size = "shared-cpu-2x"
  memory = 2048
